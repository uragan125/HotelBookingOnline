<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн бронирование отелей</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo">
        </div>
        <nav>
            <ul>
                <li><a href="#home">Главная</a></li>
                <li><a href="#hotels">Отели</a></li>
                <li><a href="#contact">Контакты</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="hero-text">
            <h1>Онлайн бронирование отелей</h1>
            <p>Лучшие отели по доступным ценам</p>
            <button onclick="scrollToHotels()">Посмотреть отели</button>
        </div>
    </section>

    <section id="hotels">
        <h2>Популярные отели</h2>
        <div class="hotel-list">
            <!-- Пример карточки отеля -->
            <div class="hotel-card">
                <img src="hotel1.jpg" alt="Отель 1">
                <h3>Отель 1</h3>
                <p>Цена: 5000 руб./ночь</p>
                <button>Забронировать</button>
            </div>
            <div class="hotel-card">
                <img src="hotel2.jpg" alt="Отель 2">
                <h3>Отель 2</h3>
                <p>Цена: 6000 руб./ночь</p>
                <button>Забронировать</button>
            </div>
        </div>
    </section>

    <section id="contact">
        <h2>Контакты</h2>
        <p>Свяжитесь с нами, если у вас есть вопросы.</p>
        <form>
            <input type="text" placeholder="Ваше имя" required>
            <input type="email" placeholder="Ваш email" required>
            <textarea placeholder="Ваше сообщение" required></textarea>
            <button type="submit">Отправить</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2024 Онлайн бронирование отелей</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
